name: DAMX Build and Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.8.8)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
      publish_release:
        description: 'Publish the release?'
        required: true
        type: boolean
        default: true
      drivers_version:
        description: 'Drivers version to use'
        required: true
        type: choice
        default: 'div-linuwu-sense'
        options:
        - 'div-linuwu-sense'
        - 'linuwu-sense'

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout main repository
      uses: actions/checkout@v4
    
    - name: Download and Setup Drivers
      run: |
        echo "Setting up drivers: ${{ inputs.drivers_version }}"
        
        if [ "${{ inputs.drivers_version }}" == "linuwu-sense" ]; then
          echo "Downloading original Linuwu-Sense drivers..."
          git clone https://github.com/0x7375646F/Linuwu-Sense.git drivers-temp
        else
          echo "Downloading Div-Linuwu-Sense drivers..."
          git clone https://github.com/PXDiv/Div-Linuwu-Sense.git drivers-temp
        fi
        
        echo "✓ Drivers repository cloned successfully"
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Detect versions from source files
      id: versions
      run: |
        # Detect GUI version
        GUI_VERSION=$(grep -oP 'private readonly string ProjectVersion\s*=\s*"\K[\d.]+' DivAcerManagerMax/MainWindow.axaml.cs || echo "unknown")
        echo "gui_version=$GUI_VERSION" >> $GITHUB_OUTPUT
        
        # Detect daemon version  
        DAEMON_VERSION=$(grep -oP 'VERSION\s*=\s*"\K[\d.]+' DAMM-Daemon/DAMX-Daemon.py || echo "unknown")
        echo "daemon_version=$DAEMON_VERSION" >> $GITHUB_OUTPUT
        
        # Detect drivers version based on selected drivers
        DRIVERS_VERSION=$(grep -oP '#define\s+DRIVER_VERSION\s+"\K[\d.]+' drivers-temp/src/linuwu_sense.c || echo "unknown")
        echo "drivers_version=$DRIVERS_VERSION" >> $GITHUB_OUTPUT
        echo "drivers_type=${{ inputs.drivers_version }}" >> $GITHUB_OUTPUT
    
    - name: Build Python Daemon
      run: |
        cd DAMM-Daemon
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        pyinstaller --onefile --clean DAMX-Daemon.py
        
    - name: Build .NET GUI
      run: |
        cd DivAcerManagerMax
        dotnet publish \
          -c Release \
          -f net9.0 \
          -r linux-x64 \
          --self-contained true \
          /p:PublishSingleFile=true \
          /p:IncludeNativeLibrariesForSelfExtract=true \
          /p:IncludeAllContentForSelfExtract=true \
          -o ./publish
    
    - name: Create Package Structure
      run: |
        PACKAGE_VERSION="${{ steps.versions.outputs.gui_version }}"
        PACKAGE_DIR="DAMX-${PACKAGE_VERSION}"
        mkdir -p "$PACKAGE_DIR"/{DAMX-Daemon,DAMX-GUI,Linuwu-Sense}
        
        cp DAMM-Daemon/dist/DAMX-Daemon "$PACKAGE_DIR/DAMX-Daemon/"
        cp DivAcerManagerMax/publish/* "$PACKAGE_DIR/DAMX-GUI/" 2>/dev/null || true
        # Ensure the main binary is named correctly if it was published with a different name
        find DivAcerManagerMax/publish/ -type f -executable -name "*DivAcerManagerMax*" -exec cp {} "$PACKAGE_DIR/DAMX-GUI/DivAcerManagerMax" \;
        
        cp -r drivers-temp/* "$PACKAGE_DIR/Linuwu-Sense/"
        cp scripts/local-setup.sh "$PACKAGE_DIR/setup.sh"
        
        # Update version info in setup script
        sed -i "s/PROJECT_VERSION=.*/PROJECT_VERSION=${{ steps.versions.outputs.gui_version }}/g" "$PACKAGE_DIR/setup.sh"
        sed -i "s/DAEMON_VERSION=.*/DAEMON_VERSION=${{ steps.versions.outputs.daemon_version }}/g" "$PACKAGE_DIR/setup.sh"
        sed -i "s/DRIVERS_VERSION=.*/DRIVERS_VERSION=${{ steps.versions.outputs.drivers_version }}/g" "$PACKAGE_DIR/setup.sh"
        chmod +x "$PACKAGE_DIR/setup.sh"
        
        echo "package_dir=$PACKAGE_DIR" >> $GITHUB_ENV
        echo "package_version=$PACKAGE_VERSION" >> $GITHUB_ENV

    - name: Generate DEB Package
      run: |
        chmod +x scripts/make-deb.sh
        ./scripts/make-deb.sh DivAcerManagerMax/publish DAMM-Daemon/dist

    - name: Create Package Archive
      run: |
        tar -cJf "${{ env.package_dir }}.tar.xz" "${{ env.package_dir }}"
        sha256sum "${{ env.package_dir }}.tar.xz" > "${{ env.package_dir }}.tar.xz.sha256"
    
    - name: Create GitHub Release
      if: ${{ inputs.publish_release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: DAMX ${{ inputs.tag }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ env.package_dir }}.tar.xz
          ${{ env.package_dir }}.tar.xz.sha256
          *.deb
        body: |
          # 🚀 DAMX Release ${{ inputs.tag }}
          
          ### 📥 Installation Instructions
          
          #### Option 1: Debian/Ubuntu (Recommended)
          1. Download the `.deb` file from the assets below.
          2. Install it using:
             ```bash
             sudo apt install ./damx_${{ steps.versions.outputs.gui_version }}_amd64.deb
             ```
          3. The installation will automatically set up the GUI and Daemon.
          
          #### Option 2: Manual Installation (.tar.xz)
          1. Download `${{ env.package_dir }}.tar.xz`.
          2. Extract the archive:
             ```bash
             tar -xJf ${{ env.package_dir }}.tar.xz
             ```
          3. Run the setup script:
             ```bash
             cd ${{ env.package_dir }} && sudo ./setup.sh
             ```
          
          ### 🛠 Component Versions
          - **GUI Version**: `${{ steps.versions.outputs.gui_version }}`
          - **Daemon Version**: `${{ steps.versions.outputs.daemon_version }}`
          - **Drivers Version**: `${{ steps.versions.outputs.drivers_version }}`
          - **Drivers Type**: `${{ steps.versions.outputs.drivers_type }}`
          
          ---
          **Checksum (SHA256):**
          ```
          $(cat ${{ env.package_dir }}.tar.xz.sha256)
          ```
          
          *Built on: $(date)*
          *Commit: ${{ github.sha }}*
